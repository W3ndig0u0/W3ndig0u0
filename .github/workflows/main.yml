name: Advanced Metrics & Snake
on:
  schedule:
    - cron: "0 */6 * * *" # Körs var 6:e timme
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Huvudstatistik (Språk, Habits, Isocalendar)
      - name: 📊 General & Habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories
          config_timezone: Europe/Stockholm
          
          # Habits (Hur du kodar)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # Languages (Indepth)
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          
          # Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 2. Anime & Manga (Anilist)
      - name: 🌸 Media Habits (AniList)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.anilist.svg
          token: NOT_NEEDED
          plugin_anilist: yes
          plugin_anilist_user: W3ndig0u0
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, characters
          plugin_anilist_limit: 2
          plugin_anilist_shuffle: yes

      # 3. Achievements (Compact & Secrets)
      - name: 🏆 Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

      # 4. Generate the Snake (Flyttad hit för att samla allt)
      - name: 🐍 Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: W3ndig0u0
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Pusha alla filer till en separat branch (output) för att hålla main ren
      - name: 🚀 Deploy to Output Branch
        uses: crazy-max/github-action-push-assets@v1
        with:
          branch: output
          assets: |
            metrics.svg
            metrics.anilist.svg
            achievements.svg
            dist/github-snake.svg
            dist/github-snake-dark.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
