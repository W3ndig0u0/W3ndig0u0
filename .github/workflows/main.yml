name: Advanced Metrics & Snake
on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. General Stats
      - name: 📊 General & Habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories
          config_timezone: Europe/Stockholm
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, percentage
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 2. AniList (Media)
      - name: 🌸 Media Habits (AniList)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.anilist.svg
          token: NOT_NEEDED
          plugin_anilist: yes
          plugin_anilist_user: W3ndig0u0
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, characters
          plugin_anilist_limit: 2

      # 3. Achievements
      - name: 🏆 Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes

      # 4. Snake Game
      - name: 🐍 Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: W3ndig0u0
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark

      # 5. Deploy to 'output' branch
      # This version uses the official way to push to a separate branch
      - name: 🚀 Deploy to Output Branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: output # Images will live here
          FOLDER: .
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Update metrics and snake [skip ci]"
