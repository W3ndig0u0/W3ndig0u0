name: Ultimate System Metrics
on:
  schedule: [{cron: "0 */6 * * *"}]
  push: {branches: ["main"]}
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

# 1. Main Dashboard 
      - name: 📊 General Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: main-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories
          config_timezone: Europe/Stockholm
          
          # --- LANGUAGES FIX ---
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 10
          plugin_languages_details: percentage
          
          # --- HABITS FIX ---
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_isocalendar: yes

      # 2. Tech Interests & Achievements
      - name: 🏆 Achievements & Topics
        uses: lowlighter/metrics@latest
        with:
          filename: extra-info.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_topics: yes
          plugin_topics_mode: starred
          plugin_topics_limit: 15

      # 3. WakaTime
      - name: ⌛ WakaTime
        uses: lowlighter/metrics@latest
        with:
          filename: wakatime.svg
          token: NOT_NEEDED
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_sections: time, projects, languages

      # 4. AniList Media
      - name: 🌸 AniList Media
        uses: lowlighter/metrics@latest
        with:
          filename: anilist.svg
          token: NOT_NEEDED
          plugin_anilist: yes
          plugin_anilist_user: W3ndig0u0
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, characters

      # 5. Snake Game (Direct to root fix)
      - name: 🐍 Snake
        uses: Platane/snk@v3
        with:
          github_user_name: W3ndig0u0
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# 6. Commit and Push (Smart Sync)
      - name: 🚀 Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Pull changes that the Metrics plugin just made
          git pull origin main --rebase
          
          # 2. Add and commit the Snake files
          git add github-snake.svg github-snake-dark.svg
          git commit -m "Update snake animation [skip ci]" || echo "No snake changes"
          
          # 3. Final Push
          git push origin main
