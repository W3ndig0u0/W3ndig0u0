name: Ultimate System Metrics
on:
  schedule: [{cron: "0 */6 * * *"}]
  push: {branches: ["main"]}
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Main Dashboard
      - name: 📊 General Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: main-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories
          config_timezone: Europe/Stockholm
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_isocalendar: yes

      # 2. Tech Interests & Achievements
      - name: 🏆 Achievements & Topics
        uses: lowlighter/metrics@latest
        with:
          filename: extra-info.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_topics: yes
          plugin_topics_mode: starred
          plugin_topics_limit: 15

      # 3. WakaTime
      - name: ⌛ WakaTime
        uses: lowlighter/metrics@latest
        with:
          filename: wakatime.svg
          token: NOT_NEEDED
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_sections: time, projects, languages

      # 4. AniList (Kept exactly as requested)
      - name: 🌸 AniList Media
        uses: lowlighter/metrics@latest
        with:
          filename: anilist.svg
          token: NOT_NEEDED
          plugin_anilist: yes
          plugin_anilist_user: W3ndig0u0
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, characters
          plugin_anilist_limit: 2
          plugin_anilist_limit_characters: 22

      # 5. Snake Game
      - name: 🐍 Snake
        uses: Platane/snk@v3
        with:
          github_user_name: W3ndig0u0
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark

      # 6. Push directly to MAIN (Fixes the 404 issue)
      - name: 🚀 Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.svg
          git commit -m "Update system metrics [skip ci]" || echo "No changes to commit"
          git push
